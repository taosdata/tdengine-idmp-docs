# Alias and ignored-ID mappings for capability extraction.
#
# This file maps non-canonical IDs (produced by AI extraction) to their
# canonical capability IDs, or marks them as ignored. It is separate from
# the capability set (taxonomy) so that the taxonomy stays conformant to
# the portable capability-set format.
#
# Structure:
#   aliases   — canonical capability ID → list of non-canonical aliases
#   ignored   — extracted IDs that are not capabilities (with reason)

aliases:
  # AI-Powered Insights
  ai-generated-panels:
    - ai-generated-analyses
  llm-connection:
    - connecting-to-llm
  # Data Ingestion
  data-collection:
    - data-ingestion

  # Collaboration
  data-export:
    - exporting-data

  # Administration
  single-sign-on:
    - sso-authentication
    - sso
  role-based-access-control:
    - rbac
  admin-console:
    - system-configuration

  # Client SDK
  client-sdk:
    - sdk

ignored:
- id: deployment-architecture
  reason: Informational overview of system architecture, not a user/admin capability
- id: sample-data
  reason: Demo/seed data utility, not a product capability
- id: backup-restore
  reason: Split into system-backup, system-restore, and system-recovery
- id: csv-import
  reason: Narrower than data-import (specific format); not a synonym
- id: opc-import
  reason: Narrower than data-import (OPC protocol specific); not a synonym
- id: easy-import
  reason: Uncertain mapping — may be a UI feature name; not confirmed synonym of data-import
- id: map-stable-to-element
  reason: Uncertain mapping — sounds like a modeling operation; not confirmed synonym of data-import
- id: element-filters
  reason: Different concept from element-search (filtering vs. searching); not a synonym
- id: data-model-import-from-tsdb
  reason: Narrower than data-model-import-export (import only, TSDB specific); not a synonym
- id: element-level-access-control
  reason: Narrower than role-based-access-control (element-scoped subset); not a synonym
