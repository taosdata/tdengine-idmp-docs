# J&J Data Historian RFI — Required Capability Set
#
# Derived from: JnJ_RFI_Requirements.md
# Method: Each numbered requirement item was tested against the capability
# definition (reference/capability-definition.md). Items that represent
# something the system can do — a task, function, or behavior that a user
# can use or an administrator can configure — are included below.
#
# ── Excluded sections (not capabilities) ──────────────────────────────────
#
# § 1.1 Deployment Options (items 1–7)
#   Deployment topology descriptions, not system actions. The system either
#   supports a deployment model or it doesn't — that is an architecture
#   attribute, not a user/admin-facing capability.
#
# § 1.3.4 Architecture mapping to J&J use case
#   A deliverable / sizing exercise, not a capability.
#
# § 3.1 Capacity & Performance (items 1–4)
#   Performance benchmarks and sizing limits — measurable attributes, not
#   independently usable functions.
#
# § 3.7 Compliance Documentation (items 1–2)
#   Documentation deliverables, not system capabilities.
#
# § 3.8 Partnerships
#   Business relationship, not a system capability.
#
# § 4.6.2 Training requirements
#   Vendor service, not a system capability.
#
# § 6.1 Cloud Platforms (items 1–4)
#   Platform support declarations — same reasoning as deployment options.
#
# § 6.3 Environment Management (items 1–2)
#   Operational practice / deployment topology, not a system function.
#
# § 6.4 SaaS Operations (items 1–3)
#   Vendor operational practices, not system capabilities.
#
# § 7.1.3 Validation matrix
#   A documentation deliverable.
#
# § 7.5 Validation Documentation / GAMP 5 (items 1–6)
#   Documentation deliverables (URS, FRS, IQ, OQ, PQ, templates).
#
# § 7.6 Change Control (items 1–3)
#   Vendor operational practices, not system capabilities.
#
# § 7.7 Vendor Validation Practices (items 1–2)
#   Vendor quality processes, not system capabilities.
#
# § 8. Licensing & Cost (all items)
#   Commercial terms and pricing structures.
#
# § 9. Vendor Profile (all items)
#   Company information, qualifications, delivery capability, roadmap.
#
# § 10. Use Case Deliverables (all items)
#   Submission artifacts and narrative requirements.
# ──────────────────────────────────────────────────────────────────────────

